<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mapa Mental FCFFL</title>
	<!-- CSS Externo -->
	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<div id="main-container">
		<svg id="svg-layer">
			<!-- Linhas desenhadas via JS -->
		</svg>

		<header id="sticky-header">
			<div class="root-node" id="root">
				<!-- Imagem da Logo -->
				<img src="logomuseu.png" alt="Logo Museu" id="logo-img"
					title="Clique para alterar (Recomendado: 100x100px)"
					style="border-radius:50%; display:block; width: 100%; height: 100%; object-fit: cover;">
				<script>
					// Previne "flash" da logo antiga carregando a nova imediatamente
					const savedLogo = localStorage.getItem('silos-custom-logo');
					if (savedLogo) document.getElementById('logo-img').src = savedLogo;
				</script>

				<!-- Overlay de Edição -->
				<div class="edit-overlay" id="edit-overlay">
					<span>✏️</span>
					<span style="font-size: 8px;">Alterar</span>
				</div>

				<!-- Input Oculto -->
				<input type="file" id="logo-input" accept="image/*" hidden>
			</div>

			<div class="silos-row" id="silos-container">
				<div class="add-silo-btn" onclick="alert('Funcionalidade futura: Criar novo silo')">+</div>
			</div>
		</header>

		<div id="scrollable-lists">
			<div class="lists-row" id="lists-container">
				<!-- Listas geradas via JS -->
			</div>
		</div>
	</div>

	<div class="modal-overlay" id="modal">
		<div class="modal">
			<span class="close-btn" onclick="closeModal()">&times;</span>
			<h2 id="modal-title">Título</h2>
			<p id="modal-desc">Descrição</p>
			<hr>
			<div style="background:#f9f9f9; padding:10px; border-radius:5px; margin-bottom:15px;">
				<strong>Links:</strong><br>
				<a href="#" id="modal-link" target="_blank">Acessar Recurso</a>
			</div>
			<button style="background:red; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;"
				onclick="alert('Simulação: Item deletado')">Excluir Item</button>
		</div>
	</div>

	<!-- Script Principal (Módulo) -->
	<script type="module" src="js/app.js"></script>
</body>

</html>
