<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mapa Mental FCFFL</title>
	<!-- CSS Externo -->
	<link rel="stylesheet" href="css/style.css">
	<!-- Favicon (SVG) -->
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
	<!-- Favicon -->
	<link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<body>

	<div id="main-container">
		<svg id="svg-layer">
			<!-- Linhas desenhadas via JS -->
		</svg>

		<header id="sticky-header">

			<!-- Barra de Ferramentas Superior (Grid) -->
			<div class="header-top-bar">
				<!-- Esquerda: Ações -->
				<div class="header-actions-left">
					<button id="btn-export-json" title="Salvar Projeto (JSON)" class="header-btn">
						💾 <span class="btn-text"></span>Salvar</span>
					</button>
					<button onclick="document.getElementById('json-input').click()" title="Abrir Projeto (JSON)"
						class="header-btn">
						📂 <span class="btn-text">Abrir</span>
					</button>
					<input type="file" id="json-input" accept=".json" style="display: none;">
				</div>

				<!-- Centro: Título do Projeto -->
				<h1 id="project-title" contenteditable="true" spellcheck="false"
					title="Clique para editar o nome do projeto">
					Meu Projeto Silos
				</h1>

				<!-- Direita: Placeholder (Futuras Configurações) -->
				<div class="header-actions-right">
					<div class="root-node-placeholder"></div>
					<button id="btn-settings" class="header-btn" title="Configurações"
						style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer;">⚙️</button>
				</div>
			</div>

			<!-- Área da Logo e Controles -->
			<div class="logo-wrapper"
				style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 40px;">

				<button id="btn-toggle-all" title="Abrir/Fechar Todos">
					👁️
				</button>

				<div class="root-node" id="root" style="margin-bottom: 0;">
					<!-- Imagem da Logo -->
					<img src="assets/logo.svg" alt="Logo Silos" id="logo-img"
						title="Clique para alterar (Recomendado: 100x100px)"
						style="border-radius:50%; display:block; width: 100%; height: 100%; object-fit: cover;">
					<script>
						// Previne "flash" da logo antiga carregando a nova imediatamente
						const savedLogo = localStorage.getItem('silos-custom-logo');
						if (savedLogo) document.getElementById('logo-img').src = savedLogo;
					</script>

					<!-- Overlay de Edição -->
					<div class="edit-overlay" id="edit-overlay" onclick="document.getElementById('logo-input').click()">
						<span>✏️</span>
						<span style="font-size: 8px;">Alterar</span>
					</div>

					<!-- Input Oculto -->
					<input type="file" id="logo-input" accept="image/*" hidden onchange="updateLogo(this)">
				</div>
			</div>

			<div class="silos-row" id="silos-container">
				<div class="add-silo-btn">+</div>
			</div>
		</header>

		<div id="scrollable-lists">
			<div class="lists-row" id="lists-container">
				<!-- Listas geradas via JS -->
			</div>
		</div>
	</div>

	<!-- Modal de Detalhes do Item (Visualização) -->
	<div class="modal-overlay" id="modal">
		<div class="modal">
			<span class="close-btn" onclick="closeModal()">&times;</span>
			<h2 id="modal-title" style="color: var(--primary); margin-top: 0;">Título</h2>
			<div id="modal-desc" style="margin: 15px 0; line-height: 1.6; color: #444;">Descrição...</div>

			<div style="display: flex; gap: 10px; margin-top: 15px;">
				<a id="modal-link" href="#" target="_blank" class="modal-btn primary">Acessar</a>
				<button id="btn-edit-item-details" class="modal-btn secondary">✏️ Editar</button>
			</div>
		</div>
	</div>

	<!-- Modal de Formulário de Item (Criar/Editar) -->
	<div class="modal-overlay" id="item-form-modal">
		<div class="modal" style="max-width: 400px;">
			<span class="close-btn" onclick="closeItemForm()">&times;</span>
			<h2 id="item-form-title" style="margin-top: 0; color: var(--primary);">Novo Item</h2>

			<div style="margin-bottom: 10px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Título</label>
				<input type="text" id="item-title-input"
					style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
			</div>

			<div style="margin-bottom: 10px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Descrição</label>
				<textarea id="item-desc-input" rows="3"
					style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
			</div>

			<div style="margin-bottom: 15px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Link (Opcional)</label>
				<input type="text" id="item-link-input"
					style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
					placeholder="https://...">
			</div>

			<div style="display: flex; justify-content: space-between; margin-top: 20px; align-items: center;">

				<!-- Container de Exclusão com Animação -->
				<div id="delete-container"
					style="flex: 1; display: flex; align-items: center; overflow: hidden; height: 40px; transition: all 0.3s ease;">

					<!-- Estado 1: Botão Inicial -->
					<button id="btn-delete-init" onclick="showDeleteConfirmation()"
						style="background: #ff4444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; display: none; white-space: nowrap; transition: transform 0.3s ease;">
						Excluir
					</button>

					<!-- Estado 2: Confirmação (Inicialmente oculto/deslocado) -->
					<div id="delete-confirm-group"
						style="display: flex; align-items: center; gap: 10px; transform: translateX(-150%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; width: 0; pointer-events: none;">
						<span style="font-size: 0.9em; color: #ff4444; font-weight: bold; white-space: nowrap;">Tem
							certeza?</span>
						<button id="btn-confirm-yes"
							style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9em;">
							Sim
						</button>
						<button onclick="hideDeleteConfirmation()"
							style="background: #eee; color: #555; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.9em;">
							Não
						</button>
					</div>
				</div>
				<div style="display: flex; gap: 10px; margin-left: auto;">
					<button onclick="closeItemForm()"
						style="background: #ccc; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Cancelar</button>
					<button id="btn-save-item"
						style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Salvar</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal de Edição/Criação de Silo -->
	<div class="modal-overlay" id="silo-modal">
		<div class="modal" style="max-width: 400px;">
			<span class="close-btn" onclick="closeSiloModal()">&times;</span>
			<h2 id="silo-modal-title" style="margin-top: 0; color: var(--primary);">Novo Silo</h2>

			<div style="margin-bottom: 15px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Nome do Silo</label>
				<input type="text" id="silo-name"
					style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
					placeholder="Ex: Financeiro">
			</div>

			<!-- Seção: Tipo de Exibição do Ícone -->
			<div style="margin-bottom: 20px;">
				<label style="display:block; font-weight:bold; margin-bottom:8px;">1. Estilo do Ícone</label>
				<div id="silo-icon-type-group" style="display: flex; gap: 15px; margin-bottom: 15px;">
					<label style="cursor: pointer; font-size: 0.95em; display: flex; align-items: center; gap: 5px;">
						<input type="radio" name="icon-type" value="emoji" checked>
						<span>Emoji</span>
					</label>
					<label style="cursor: pointer; font-size: 0.95em; display: flex; align-items: center; gap: 5px;">
						<input type="radio" name="icon-type" value="image">
						<span>Ícone Personalizado</span>
					</label>
					<label style="cursor: pointer; font-size: 0.95em; display: flex; align-items: center; gap: 5px;">
						<input type="radio" name="icon-type" value="full">
						<span>Capa (Imagem Cheia)</span>
					</label>
				</div>

				<!-- Input Emoji -->
				<div id="silo-input-emoji" style="margin-bottom: 10px;">
					<input type="text" id="silo-icon-text"
						style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; text-align: center; font-size: 1.5rem;"
						placeholder="📂">
				</div>

				<!-- Input Imagem -->
				<div id="silo-input-image"
					style="display: none; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px dashed #ccc;">
					<label style="font-size: 0.8em; color: #666; display: block; margin-bottom: 3px;">URL da
						Imagem:</label>
					<input type="text" id="silo-icon-url"
						style="width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 6px; margin-bottom: 8px; font-size: 0.9rem;"
						placeholder="https://...">

					<div style="text-align: center; margin: 5px 0; font-size: 0.8em; color: #aaa;">- OU -</div>

					<label style="font-size: 0.8em; color: #666; display: block; margin-bottom: 3px;">Upload do
						Computador:</label>
					<input type="file" id="silo-icon-file" accept="image/*" style="width: 100%; font-size: 0.9rem;">

					<!-- Preview -->
					<div style="margin-top: 10px; text-align: center;">
						<img id="silo-icon-preview" src="" alt="Prévia"
							style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; display: none; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
						<div id="preview-label" style="font-size: 0.7em; color: #999; margin-top: 4px; display: none;">
							Prévia</div>
					</div>
				</div>
			</div>

			<!-- Seção: Tipo de Layout (Agora em Coluna e Radio Buttons) -->
			<div style="margin-bottom: 10px;">
				<label style="display:block; font-weight:bold; margin-bottom:8px;">2. Estilo do Conteúdo (Lista)</label>
				<div style="display: flex; flex-direction: column; gap: 8px;">
					<label
						style="cursor: pointer; padding: 8px; border: 1px solid #eee; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
						<input type="radio" name="layout-type" value="default" checked>
						<div>
							<div style="font-weight: 600; font-size: 0.95em;">Padrão</div>
							<div style="font-size: 0.8em; color: #666;">Lista simples com título e descrição curta.
							</div>
						</div>
					</label>

					<label
						style="cursor: pointer; padding: 8px; border: 1px solid #eee; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
						<input type="radio" name="layout-type" value="project">
						<div>
							<div style="font-weight: 600; font-size: 0.95em;">Projetos</div>
							<div style="font-size: 0.8em; color: #666;">Cartões mais largos, ideais para descrições mais
								longas.</div>
						</div>
					</label>

					<label
						style="cursor: pointer; padding: 8px; border: 1px solid #eee; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
						<input type="radio" name="layout-type" value="person">
						<div>
							<div style="font-weight: 600; font-size: 0.95em;">Pessoas</div>
							<div style="font-size: 0.8em; color: #666;">Cartões compactos, destaque no nome e cargo.
							</div>
						</div>
					</label>
				</div>
			</div>

			<div style="display: flex; justify-content: space-between; margin-top: 20px;">
				<button id="btn-delete-silo"
					style="background: #ff4444; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; display: none;">Excluir</button>
				<div style="display: flex; gap: 10px; margin-left: auto;">
					<button onclick="closeSiloModal()"
						style="background: #ccc; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Cancelar</button>
					<button id="btn-save-silo"
						style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Salvar</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Modal de Confirmação de Exclusão -->
	<div class="modal-overlay" id="delete-modal">
		<div class="modal" style="max-width: 450px; border-left: 5px solid #ff4444;">
			<h2 style="color: #ff4444; margin-top: 0;">⚠️ Excluir Silo?</h2>

			<p id="delete-msg" style="font-size: 1.1em; color: #333; margin-bottom: 10px;">
				Tem certeza que deseja excluir este silo?
			</p>

			<div id="delete-items-preview"
				style="background: #fff0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px; max-height: 150px; overflow-y: auto; font-size: 0.9em; color: #555;">
				<!-- Lista de itens vai aqui -->
			</div>

			<p style="font-size: 0.8em; color: #666; margin-top: -10px; margin-bottom: 20px;">
				Esta ação <strong>NÃO</strong> pode ser desfeita.
			</p>

			<div style="display: flex; justify-content: flex-end; gap: 10px;">
				<button onclick="closeDeleteModal()"
					style="background: #ccc; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Cancelar</button>
				<button id="btn-confirm-delete"
					style="background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Sim,
					Excluir Tudo</button>
			</div>
		</div>
	</div>

	<!-- Modal de Configurações (Tema) -->
	<div class="modal-overlay" id="settings-modal">
		<div class="modal" style="max-width: 400px;">
			<span class="close-btn" onclick="closeSettingsModal()">&times;</span>
			<h2 style="margin-top: 0; color: var(--primary);">Personalização</h2>

			<div style="margin-bottom: 20px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Cor Principal (Logo e
					Títulos)</label>
				<div style="display: flex; align-items: center; gap: 10px;">
					<input type="color" id="color-primary" value="#0067b8"
						style="cursor: pointer; height: 40px; width: 60px;">
					<span id="val-primary" style="font-family: monospace;">#0067b8</span>
				</div>
			</div>

			<div style="margin-bottom: 20px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Cor de Destaque
					(Ações)</label>
				<div style="display: flex; align-items: center; gap: 10px;">
					<input type="color" id="color-accent" value="#ff6f00"
						style="cursor: pointer; height: 40px; width: 60px;">
					<span id="val-accent" style="font-family: monospace;">#ff6f00</span>
				</div>
			</div>

			<div style="margin-bottom: 20px;">
				<label style="display:block; font-weight:bold; margin-bottom:5px;">Cor de Fundo</label>
				<div style="display: flex; align-items: center; gap: 10px;">
					<input type="color" id="color-bg" value="#f4f7f6"
						style="cursor: pointer; height: 40px; width: 60px;">
					<span id="val-bg" style="font-family: monospace;">#f4f7f6</span>
				</div>
			</div>

			<h3 style="margin-top: 20px; margin-bottom: 10px; color: var(--primary); font-size: 1rem;">Comportamento e
				Interação
			</h3>

			<div style="margin-bottom: 10px;">
				<label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
					<input type="checkbox" id="toggle-esc" checked style="width: 18px; height: 18px;">
					<span>Fechar modais <strong>com tecla ESC</strong></span>
				</label>
			</div>

			<div style="margin-bottom: 20px;">
				<label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
					<input type="checkbox" id="toggle-overlay" style="width: 18px; height: 18px;">
					<span>Fechar modais <strong>ao clicar fora</strong></span>
				</label>
			</div>

			<hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

			<div style="display: flex; justify-content: space-between;">
				<button id="btn-reset-theme"
					style="background: #ccc; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Restaurar
					Padrão</button>
				<button onclick="closeSettingsModal()"
					style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Concluir</button>
			</div>
		</div>
	</div>

	<!-- Container de Toasts (Notificações) -->
	<div id="toast-container"></div>

	<!-- Script Principal (Módulo) -->
	<script type="module" src="js/app.js"></script>
</body>

</html>
